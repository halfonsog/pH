<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>pH / Fugacity Calculator</title>
</head>

<body>

  <h2>Test</h2>
  <button onclick="runTest()">Run</button>

  <script>

    // =======================
    // CONSTANTES
    // =======================
    const R = 0.08314;

    const CO2 = { name: "CO2", Tc: 304.2, Pc: 73.7, w: 0.225 };
    const H2S = { name: "H2S", Tc: 373.2, Pc: 89.4, w: 0.1 };
    const CH4 = { name: "CH4", Tc: 190.6, Pc: 46.0, w: 0.008 };
    const H2O = { name: "H2O", Tc: 647.3, Pc: 220.5, w: 0.344 };

    const kij = {
      CO2: { CO2: 0, H2S: 0.099, CH4: 0.1, H2O: 0.19 },
      H2S: { CO2: 0.099, H2S: 0, CH4: 0.084, H2O: 0.105 },
      CH4: { CO2: 0.1, H2S: 0.084, CH4: 0, H2O: 0.479 },
      H2O: { CO2: 0.19, H2S: 0.105, CH4: 0.479, H2O: 0 }
    };

    // =======================
    // UTIL
    // =======================
    function logCell(name, val) {
      console.log(name, "=", val);
    }

    // =======================
    // PR EOS
    // =======================
    function calc_ai(comp, T) {
      const Tr = (T + 273.15) / comp.Tc;
      const kappa = 0.37464 + 1.54226 * comp.w - 0.26992 * comp.w * comp.w;
      const alpha = Math.pow(1 + kappa * (1 - Math.sqrt(Tr)), 2);

      return 0.45724 * R * R * comp.Tc * comp.Tc / comp.Pc * alpha;
    }

    function calc_bi(comp) {
      return 0.07780 * R * comp.Tc / comp.Pc;
    }

    // =======================
    // MEZCLA
    // =======================
    function A_real(comp, T) {
      let sum = 0;

      for (let i of comp) {
        for (let j of comp) {
          const ai = calc_ai(i.p, T);
          const aj = calc_ai(j.p, T);
          const aij = Math.sqrt(ai * aj) * (1 - kij[i.name][j.name]);

          sum += i.y * j.y * aij;
        }
      }
      return sum;
    }

    function B_mix(comp) {
      let sum = 0;
      for (let i of comp) {
        sum += i.y * calc_bi(i.p);
      }
      return sum;
    }

    function A_red(A, T, P) {
      return A * P / (R * R * (T + 273.15) * (T + 273.15));
    }

    function B_red(B, T, P) {
      return B * P / (R * (T + 273.15));
    }

    // =======================
    // SOLVER Z
    // =======================
    function solveZ(A, B) {
      let bestZ = 1;
      let minErr = 1e9;

      for (let z = 0.01; z < 1.5; z += 0.001) {
        const f = z * z * z - (1 - B) * z * z + (A - 3 * B * B - 2 * B) * z - (A * B - B * B - B * B * B);
        const err = Math.abs(f);

        if (err < minErr) {
          minErr = err;
          bestZ = z;
        }
      }

      return bestZ;
    }

    // =======================
    // PHI
    // =======================
    function phi_i(comp_i, comp, T, P) {

      const A_r = A_real(comp, T);
      const B = B_mix(comp);

      const A = A_red(A_r, T, P);
      const B_r = B_red(B, T, P);

      const Z = solveZ(A, B_r);

      const ai = calc_ai(comp_i.p, T);
      const bi = calc_bi(comp_i.p);

      let sum = 0;

      for (let j of comp) {
        const aj = calc_ai(j.p, T);
        const aij = Math.sqrt(ai * aj) * (1 - kij[comp_i.name][j.name]);
        sum += j.y * aij;
      }

      const logTerm = Math.log(
        (Z + (1 + Math.sqrt(2)) * B_r) /
        (Z - (Math.sqrt(2) - 1) * B_r)
      );

      const term1 = (bi / B) * (Z - 1);
      const term2 = -Math.log(Z - B_r);

      const term3 =
        (A / (2 * Math.sqrt(2) * B_r)) *
        ((2 * sum / A_r) - (bi / B)) *
        logTerm;

      const lnphi = term1 + term2 - term3;

      return Math.exp(lnphi);
    }

    // =======================
    // CALCULO DIRECTO (SIN EQUILIBRIO)
    // =======================
    function compute(ctx) {

      const T = ctx.T;
      const P = ctx.P;

      const yCO2 = ctx.CO2 / 100;
      const yH2S = ctx.H2S / 100;
      const yH2O = 0.00034;
      const yCH4 = 1 - yCO2 - yH2S - yH2O;

      const comp = [
        { name: "CO2", y: yCO2, p: CO2 },
        { name: "H2S", y: yH2S, p: H2S },
        { name: "CH4", y: yCH4, p: CH4 },
        { name: "H2O", y: yH2O, p: H2O }
      ];

      const phiCO2 = phi_i(comp[0], comp, T, P);
      const phiH2S = phi_i(comp[1], comp, T, P);

      const H13 = yCO2 * P * phiCO2;
      const H18 = yH2S * P * phiH2S;

      logCell("phi_CO2", phiCO2);
      logCell("phi_H2S", phiH2S);
      logCell("H13", H13);
      logCell("H18", H18);
    }

    // =======================
    // TEST
    // =======================
    function runTest() {

      console.clear();

      console.log("=== TEST 10 bar ===");
      compute({
        T: 25,
        P: 10,
        CO2: 10,
        H2S: 1
      });

      console.log("=== TEST 100 bar ===");
      compute({
        T: 25,
        P: 100,
        CO2: 10,
        H2S: 1
      });
    }

  </script>

</body>

</html>
