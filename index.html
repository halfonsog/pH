<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>PR Fugacity</title>
</head>

<body>

  <h2>Test PR EOS</h2>
  <button onclick="run()">Calcular</button>

  <script>

    // ======================
    // CONSTANTES
    // ======================
    const R = 0.08314;
    const gamma = 1.16;
    //const P_eff_factor = 0.84;

    // ======================
    // COMPONENTES
    // ======================
    const CO2 = { Tc: 304.2, Pc: 73.7, omega: 0.225 };
    const H2S = { Tc: 373.2, Pc: 89.4, omega: 0.1 };
    const CH4 = { Tc: 190.6, Pc: 46.0, omega: 0.008 };
    const H2O = { Tc: 647.3, Pc: 220.5, omega: 0.344 };

    // ======================
    // kij (DEL EXCEL)
    // ======================
    const kij = {
      CO2: { CO2: 0, H2S: 0.099, CH4: 0.100, H2O: 0.190 },
      H2S: { CO2: 0.099, H2S: 0, CH4: 0.084, H2O: 0.105 },
      CH4: { CO2: 0.100, H2S: 0.084, CH4: 0, H2O: 0.479 },
      H2O: { CO2: 0.190, H2S: 0.105, CH4: 0.479, H2O: 0 }
    };

    const corrParams = {
      CO2: { eta: -0.114535, tau: -5.279063, beta: 6.187967 },
      H2S: { eta: -0.2029, tau: -13.4046, beta: 13.8582 }
    };

    // ======================
    // INPUT (CASO TEST)
    // ======================
    function getCtx() {
      return {
        D7: 25 + 273.15, // K
        D8: 100,         // bar
        D9: 10,          // %
        D10: 1           // %
      };
    }

    // ======================
    // UTIL
    // ======================
    function logCell(name, val) {
      console.log(name + " =", val);
    }

    function memo(ctx, key, fn) {
      if (!ctx._m) ctx._m = {};
      if (ctx._m[key] !== undefined) return ctx._m[key];
      const v = fn();
      ctx._m[key] = v;
      logCell(key, v);
      return v;
    }

    // ======================
    // PR FUNCIONES
    // ======================
    function kappa(w) {
      return 0.37464 + 1.54226 * w - 0.26992 * w * w;
    }

    function alpha(T, Tc, w) {
      const Tr = T / Tc;
      return Math.pow(1 + kappa(w) * (1 - Math.sqrt(Tr)), 2);
    }

    function calc_ai(p, T) {
      return 0.45724 * (R * R * p.Tc * p.Tc / p.Pc) * alpha(T, p.Tc, p.omega);
    }

    function calc_bi(p) {
      return 0.07780 * (R * p.Tc / p.Pc);
    }

    // ======================
    // COMPOSICIÓN
    // ======================
    function composition(ctx) {
      const y_co2 = ctx.D9 / 100;
      const y_h2s = ctx.D10 / 100;
      const y_h2o = 0.00034;
      const y_ch4 = 1 - y_co2 - y_h2s - y_h2o;

      return [
        { name: "CO2", y: y_co2, p: CO2 },
        { name: "H2S", y: y_h2s, p: H2S },
        { name: "CH4", y: y_ch4, p: CH4 },
        { name: "H2O", y: y_h2o, p: H2O }
      ];
    }

    // ======================
    // A y B mezcla
    // ======================
    function A_real(ctx) {
      return memo(ctx, "A_mix_real", () => {
        const T = ctx.D7;
        const comp = corrected_y(ctx);  // composition(ctx);

        let A = 0;

        for (let i = 0; i < comp.length; i++) {
          for (let j = 0; j < comp.length; j++) {

            const ai = calc_ai(comp[i].p, T);
            const aj = calc_ai(comp[j].p, T);

            const kij_ij = kij[comp[i].name][comp[j].name];

            A += comp[i].y * comp[j].y *
              Math.sqrt(ai * aj) * (1 - kij_ij);
          }
        }

        return A;
      });
    }

    function A_red(ctx) {
      return memo(ctx, "A_mix", () => {
        const T = ctx.D7;
        const P = ctx.D8;

        return A_real(ctx) * P / (R * R * T * T);
      });
    }

    function B_mix(ctx) {
      return memo(ctx, "B_mix", () => {
        const T = ctx.D7;
        const P = ctx.D8;
        const comp = composition(ctx);

        let B = 0;

        for (let c of comp) {
          B += c.y * calc_bi(c.p);
        }

        return B * P / (R * T);
      });
    }

    // ======================
    // SOLVER CÚBICO PR
    // ======================
    function solveZ(A, B) {

      const c2 = -(1 - B);
      const c1 = A - 3 * B * B - 2 * B;
      const c0 = -(A * B - B * B - B * B * B);

      const Q = (3 * c1 - c2 * c2) / 9;
      const R = (9 * c2 * c1 - 27 * c0 - 2 * c2 * c2 * c2) / 54;
      const D = Q * Q * Q + R * R;

      let roots = [];

      if (D >= 0) {
        // una raíz real
        const S = Math.cbrt(R + Math.sqrt(D));
        const T = Math.cbrt(R - Math.sqrt(D));

        const Z = -c2 / 3 + (S + T);
        roots = [Z];
      } else {
        // tres raíces reales
        const theta = Math.acos(R / Math.sqrt(-Q * Q * Q));

        const r = 2 * Math.sqrt(-Q);

        const Z1 = r * Math.cos(theta / 3) - c2 / 3;
        const Z2 = r * Math.cos((theta + 2 * Math.PI) / 3) - c2 / 3;
        const Z3 = r * Math.cos((theta + 4 * Math.PI) / 3) - c2 / 3;

        roots = [Z1, Z2, Z3];
      }

      console.log("Z roots (real):", roots);

      return Math.max(...roots); // fase gas
    }

    // ======================
    // Z
    // ======================
    function Z(ctx) {
      return memo(ctx, "Z_mix", () => {
        return solveZ(A_red(ctx), B_mix(ctx));
      });
    }

    // ======================
    // FUGACIDAD
    // ======================
    function phi_i(ctx, comp_i) {
      return memo(ctx, "phi_" + comp_i.name, () => {

        const comp = corrected_y(ctx);  // composition(ctx);
        const T = ctx.D7;

        const A_real_val = A_real(ctx);   // ← ESTE es el importante
        const A_red_val = A_red(ctx);    // ← este solo para fuera
        const B = B_mix(ctx);
        const Zm = Z(ctx);

        const ai = calc_ai(comp_i.p, T);
        const bi = calc_bi(comp_i.p);

        // Σ yj * aij
        let sum_aij = 0;

        for (let j of comp) {
          const aj = calc_ai(j.p, T);
          const kij_ij = kij[comp_i.name][j.name];

          const aij = Math.sqrt(ai * aj) * (1 - kij_ij);

          sum_aij += j.y * aij;
        }

        // términos PR
        const term1 = (bi / B) * (Zm - 1);
        const term2 = -Math.log(Zm - B);

        // ⚠️ FORMULA EXACTA (IMPORTANTE)
        const logTerm = Math.log(
          (Zm + (1 + Math.sqrt(2)) * B) /
          (Zm - (Math.sqrt(2) - 1) * B)
        );

        logCell("logTerm_" + comp_i.name, logTerm);

        // calcular A_ij en forma reducida
        let sum_aij_red = 0;

        for (let j of comp) {
          const aj = calc_ai(j.p, T);
          const kij_ij = kij[comp_i.name][j.name];

          const aij = Math.sqrt(ai * aj) * (1 - kij_ij);

          // convertir a forma reducida
          sum_aij_red += j.y * aij * ctx.D8 / (R * R * T * T);
        }

        // ahora TODO consistente
        const term3 =
          (1 / (2 * Math.sqrt(2) * B)) *
          ((2 * sum_aij_red / A_red_val) - (bi / B)) *
          logTerm;


        const lnphi = term1 + term2 - term3;

        logCell("ln_phi_" + comp_i.name, lnphi);

        return Math.exp(lnphi);
      });
    }

    function correction_ln(gas, T, P) {

      const p = corrParams[gas];

      const term_eta = p.eta;
      const term_tau = p.tau / T;

      // 🔥 escala controlada
      const term_beta = p.beta * Math.log(1 + P / 10);

      const result = term_eta + term_tau + term_beta;

      console.log("corr_ln_" + gas, result);

      return result;
    }

    function corrected_y(ctx) {

      const P = ctx.D8;

      const y_co2 = ctx.D9 / 100;
      const y_h2s = ctx.D10 / 100;

      // 🔥 efecto de disolución (aprox inicial)
      const factor = 1 / (1 + 0.02 * P);

      const y_co2_corr = y_co2 * factor;
      const y_h2s_corr = y_h2s * factor;

      const y_h2o = 0.00034;
      const y_ch4 = 1 - y_co2_corr - y_h2s_corr - y_h2o;

      return [
        { name: "CO2", y: y_co2_corr, p: CO2 },
        { name: "H2S", y: y_h2s_corr, p: H2S },
        { name: "CH4", y: y_ch4, p: CH4 },
        { name: "H2O", y: y_h2o, p: H2O }
      ];
    }


    // ======================
    // RESULTADOS
    // ======================
    function H13(ctx) {
      return memo(ctx, "H13", () => {

        const base =
          (ctx.D9 / 100) *
          ctx.D8 *
          phi_i(ctx, { name: "CO2", p: CO2 });

        const corr = Math.exp(
          correction_ln("CO2", ctx.D7, ctx.D8)
        );

        logCell("corr_CO2", corr);

        return base * corr;
      });
    }


    function H18(ctx) {
      return memo(ctx, "H18", () => {

        const base =
          (ctx.D10 / 100) *
          ctx.D8 *
          phi_i(ctx, { name: "H2S", p: H2S });

        const corr = Math.exp(
          correction_ln("H2S", ctx.D7, ctx.D8)
        );

        logCell("corr_H2S", corr);

        return base * corr;
      });
    }


    // ======================
    // RUN
    // ======================
    function run() {
      console.clear();

      const ctx = getCtx();

      H13(ctx);
      H18(ctx);
    }

  </script>

</body>

</html>
